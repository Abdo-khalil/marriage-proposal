<!DOCTYPE html>
<html>
<head>
  <title>I Love You ❤️</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: black;
      color: white;
      overflow: hidden;
    }

    h1 {
      margin-top: 100px;
      font-size: 40px;
      animation: fadeIn 3s;
    }

    p {
      font-size: 20px;
      margin: 20px;
      animation: fadeIn 5s;
    }

    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }

    .heart {
      position: absolute;
      color: red;
      font-size: 20px;
      animation: float 5s linear infinite;
    }

    @keyframes float {
      from {transform: translateY(0);}
      to {transform: translateY(-800px);}
    }
  </style>
</head>

<body>

<h1> ❤️❤️❤️  حبيبة قلبي مش زعلانه  ❤️❤️❤️ </h1>
<p>I love you forever 😍</p>

<script>
function createHeart() {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "❤️";

  heart.style.left = Math.random() * window.innerWidth + "px";
  heart.style.top = window.innerHeight + "px";

  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 5000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
