<!DOCTYPE html>
<html>
<head>
  <title>For You ❤️</title>
  <meta charset="UTF-8">
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #ffe6e6;
      margin-top: 100px;
    }

    h1 {
      font-size: 40px;
    }

    button {
      padding: 15px 25px;
      font-size: 18px;
      margin: 10px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    #yes {
      background: #ff4d4d;
      color: white;
    }

    #no {
      background: #999;
      color: white;
      position: absolute;
    }
  </style>
</head>
<body>

  <h1>❤️❤️❤️لسه زعلانه يا جوجو❤️❤️❤️</h1>

  <button id="yes" onclick="yesClick()">لا يا عيون جوجو  ❤️</button>
  <button id="no" onmouseover="moveButton()">اه زعلانه جدا  😢</button>

  <script>
    function moveButton() {
      let btn = document.getElementById("no");
      let x = Math.random() * (window.innerWidth - 100);
      let y = Math.random() * (window.innerHeight - 100);

      btn.style.left = x + "px";
      btn.style.top = y + "px";
    }

    function yesClick() {
      document.body.innerHTML = "<h1> ❤️❤️❤️حبيبية قلبي مش زعلانه ❤️❤️❤️</h1>";
    }
  </script>

</body>
</html>
